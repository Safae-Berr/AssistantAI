services:
  backend:
    build: ./backend
    container_name: medai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: medai_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  db:
    image: postgres:16
    container_name: medai_db
    restart: always
    environment:
      POSTGRES_DB: medai
      POSTGRES_USER: medai_user
      POSTGRES_PASSWORD: medai_password
    ports:
      - "5432:5432"
    volumes:
      - medai_postgres_data:/var/lib/postgresql/data

volumes:
  medai_postgres_data: